# Local development infrastructure for Project Rotom (Phase 0).
# Brings up PostgreSQL and Redis with health checks so the backend can wait
# for them to be ready before running migrations / serving traffic.
services:
  postgres:
    image: postgres:16-alpine
    container_name: rotom-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rotom
      POSTGRES_PASSWORD: rotom
      POSTGRES_DB: rotom
    # Host port 5433 to avoid clashing with a native Postgres on 5432.
    ports:
      - "5433:5432"
    volumes:
      - rotom-postgres-data:/var/lib/postgresql/data
      # Creates the rotom_test database on first init (test isolation).
      - ./db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rotom -d rotom"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: rotom-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    # Host port 6380 to avoid clashing with a native Redis on 6379.
    ports:
      - "6380:6379"
    volumes:
      - rotom-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  rotom-postgres-data:
  rotom-redis-data:
